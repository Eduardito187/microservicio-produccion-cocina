services:
  laravel_app:
    container_name: laravel_app
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/apache-fqdn.conf:/etc/apache2/conf-available/fqdn.conf:ro
      - ./docker/laravel.conf:/etc/apache2/sites-available/laravel.conf:ro
    working_dir: /var/www/html
    environment:
      DB_HOST: mysql_server
      DB_PORT: 3306
      RUN_PACT_ON_START: "0"
      RUN_UNIT_TESTS_ON_START: "0"
      RUN_RABBITMQ_CONSUMER: "1"
      RUN_CRON_SCHEDULER: "1"
      RUN_CONSUL_REGISTER: "${RUN_CONSUL_REGISTER:-1}"
      SERVICE_DISCOVERY_DRIVER: "${SERVICE_DISCOVERY_DRIVER:-consul}"
      SERVICE_NAME: "${SERVICE_NAME:-microservicio-produccion-cocina}"
      SERVICE_ADDRESS: "${SERVICE_ADDRESS:-laravel_app}"
      SERVICE_PORT: "${SERVICE_PORT:-80}"
      CONSUL_HOST: "${CONSUL_HOST:-consul}"
      CONSUL_PORT: "${CONSUL_PORT:-8500}"
      TRACING_ENABLED: "${TRACING_ENABLED:-true}"
      TRACING_SERVICE_NAME: "${TRACING_SERVICE_NAME:-microservicio-produccion-cocina}"
      TRACING_EXPORTER: "${TRACING_EXPORTER:-zipkin}"
      ZIPKIN_ENDPOINT: "${ZIPKIN_ENDPOINT:-http://jaeger:9411/api/v2/spans}"
    depends_on:
      mysql_server:
        condition: service_healthy
      consul:
        condition: service_started
      jaeger:
        condition: service_started

  prometheus:
    container_name: prometheus
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - cadvisor
      - node_exporter

  grafana:
    container_name: grafana
    image: grafana/grafana-oss:11.1.4
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

  loki:
    container_name: loki
    image: grafana/loki:3.1.1
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./docker/monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki

  promtail:
    container_name: promtail
    image: grafana/promtail:3.1.1
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./docker/monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./storage/logs:/var/www/html/storage/logs:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail_positions:/tmp
    depends_on:
      - loki

  cadvisor:
    container_name: cadvisor
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    ports:
      - "${CADVISOR_PORT:-8081}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro

  node_exporter:
    container_name: node_exporter
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

  consul:
    container_name: consul
    image: hashicorp/consul:1.18
    restart: unless-stopped
    command: agent -dev -client=0.0.0.0 -ui
    ports:
      - "${CONSUL_UI_PORT:-8500}:8500"
      - "${CONSUL_DNS_PORT:-8600}:8600/udp"
    volumes:
      - consul_data:/consul/data

  jaeger:
    container_name: jaeger
    image: jaegertracing/all-in-one:1.57
    restart: unless-stopped
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${JAEGER_ZIPKIN_PORT:-9411}:9411"
      - "${JAEGER_OTLP_GRPC_PORT:-4317}:4317"
      - "${JAEGER_OTLP_HTTP_PORT:-4318}:4318"

  mysql_server:
    container_name: mysql_server
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "33006:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

volumes:
  mysql_data:
  grafana_data:
  prometheus_data:
  loki_data:
  promtail_positions:
  consul_data:
