name: Release (SSH)

on:
  push:
    branches: [ "main" ]

concurrency:
  group: release-main
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build & Test
  # Validates the codebase before releasing.
  # ─────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_sqlite, sqlite3
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --no-dev

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Install PHP dependencies (with dev for tests)
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run tests (no coverage)
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
          QUEUE_CONNECTION: sync
          OUTBOX_SKIP_DISPATCH: "true"
          PACT_BYPASS_AUTH: "true"
          EVENTBUS_DRIVER: sync
        run: |
          mkdir -p database
          touch database/database.sqlite
          php artisan migrate --force
          ./vendor/bin/phpunit --colors=never --no-coverage

      - name: Build deploy artifact
        run: |
          git archive --format=tar.gz -o app.tgz HEAD
          test -s app.tgz

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-artifact
          path: app.tgz
          retention-days: 1

  # ─────────────────────────────────────────────
  # Job 2: Release
  # Deploys to the production VPS via SSH.
  # Only runs if build job succeeds.
  # ─────────────────────────────────────────────
  release:
    name: Release to Production
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    env:
      APP_DIR: ${{ vars.VPS_APP_DIR || '/opt/microservicio-produccion-cocina' }}

    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: app-artifact

      - name: Upload artifact to VPS (/tmp)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_ROOT }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          source: "app.tgz"
          target: "/tmp"
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: ${{ env.APP_DIR }}
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_ROOT }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          envs: APP_DIR
          script: |
            set -eu
            (set -o pipefail) 2>/dev/null || true

            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            else
              echo "[deploy] ERROR: docker compose no está instalado."
              exit 1
            fi

            echo "[deploy] APP_DIR=${APP_DIR}"

            # Stop current containers (if any)
            if [ -f "${APP_DIR}/docker-compose.yml" ]; then
              cd "${APP_DIR}"
              $COMPOSE down || true
            fi

            # Extract code (keeps existing .env + storage because they are not in the tarball)
            mkdir -p "${APP_DIR}"
            tar -xzf /tmp/app.tgz -C "${APP_DIR}"
            rm -f /tmp/app.tgz

            cd "${APP_DIR}"

            mkdir -p storage bootstrap/cache
            chmod -R ug+rw storage bootstrap/cache || true

            rm -rf vendor node_modules

            export DOCKER_BUILDKIT=0
            export COMPOSE_DOCKER_CLI_BUILD=0
            $COMPOSE up -d --build
            $COMPOSE ps

      # ── Post-deploy monitoring ─────────────────
      - name: Monitor – container health & recent logs
        if: always()
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: ${{ env.APP_DIR }}
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_ROOT }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          envs: APP_DIR
          script: |
            set -eu

            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            else
              COMPOSE="docker-compose"
            fi

            cd "${APP_DIR}"

            echo "══════════════════════════════════════"
            echo " Container status"
            echo "══════════════════════════════════════"
            $COMPOSE ps

            echo ""
            echo "══════════════════════════════════════"
            echo " Last 50 log lines (app container)"
            echo "══════════════════════════════════════"
            $COMPOSE logs --tail=50 laravel_app 2>/dev/null || $COMPOSE logs --tail=50

            echo ""
            echo "══════════════════════════════════════"
            echo " Grafana endpoint"
            echo "══════════════════════════════════════"
            echo "http://$(hostname -I | awk '{print $1}'):3000"

            echo ""
            echo "══════════════════════════════════════"
            echo " Laravel application log (last 30 lines)"
            echo "══════════════════════════════════════"
            tail -n 30 "${APP_DIR}/storage/logs/laravel.log" 2>/dev/null \
              || echo "[monitor] No laravel.log found yet."
