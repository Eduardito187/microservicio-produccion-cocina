name: Deploy (SSH)

on:
  workflow_run:
    workflows: ["Laravel CI"]
    types: [completed]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      APP_DIR: ${{ vars.VPS_APP_DIR || '/opt/microservicio-produccion-cocina' }}

    steps:
      - name: Checkout (same SHA as CI)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Build deploy artifact
        run: |
          # Use git archive to avoid "file changed as we read it" tar failures.
          # It only packages tracked files from the checked-out SHA.
          git archive --format=tar.gz -o app.tgz HEAD
          test -s app.tgz

      - name: Upload artifact to VPS (/tmp)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_ROOT }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          source: "app.tgz"
          target: "/tmp"
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: ${{ env.APP_DIR }}
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_ROOT }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          envs: APP_DIR
          script: |
            set -eu
            (set -o pipefail) 2>/dev/null || true

            compose() {
              docker compose "$@" 2>/dev/null || docker-compose "$@"
            }

            echo "[deploy] APP_DIR=${APP_DIR}"

            # Stop current containers (if any)
            if [ -f "${APP_DIR}/docker-compose.yml" ]; then
              cd "${APP_DIR}"
              compose down || true
            fi

            # Extract code (keeps existing .env + storage because they are not in the tarball)
            mkdir -p "${APP_DIR}"
            tar -xzf /tmp/app.tgz -C "${APP_DIR}"
            rm -f /tmp/app.tgz

            cd "${APP_DIR}"

            # Ensure Laravel runtime dirs exist
            mkdir -p storage bootstrap/cache
            chmod -R ug+rw storage bootstrap/cache || true

            # Force dependencies refresh (entrypoint re-installs when missing)
            rm -rf vendor node_modules

            # Rebuild/restart
            compose up -d --build
            compose ps
