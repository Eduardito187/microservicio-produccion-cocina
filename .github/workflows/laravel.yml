# This workflow will build a Laravel/PHP project and run SonarCloud analysis
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-php
name: Laravel CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONARTOKEN }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION || secrets.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || secrets.SONAR_PROJECT_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_sqlite, sqlite3
          coverage: pcov

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install Node dependencies
        run: npm ci

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Set directory permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Run Pint linting
        run: ./vendor/bin/pint --test

      - name: Run ESLint linting
        run: npx eslint resources/js --ext .js,.ts

      - name: Run database migrations
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: |
          mkdir -p database
          touch database/database.sqlite
          php artisan migrate --force

      - name: Execute tests with code coverage
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
          QUEUE_CONNECTION: sync
          OUTBOX_SKIP_DISPATCH: "true"
          PACT_BYPASS_AUTH: "true"
          EVENTBUS_DRIVER: sync
        run: >
          ./vendor/bin/phpunit
          --coverage-clover=coverage.xml
          --log-junit=junit.xml
          --colors=never

      - name: Verify coverage file exists
        run: test -f coverage.xml

      - name: Validate Sonar settings
        if: ${{ env.SONAR_TOKEN != '' }}
        run: |
          test -n "$SONAR_ORGANIZATION" || (echo "Missing SONAR_ORGANIZATION (Variable or Secret)" && exit 1)
          test -n "$SONAR_PROJECT_KEY" || (echo "Missing SONAR_PROJECT_KEY (Variable or Secret)" && exit 1)

      - name: SonarCloud Scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_ORGANIZATION != '' && env.SONAR_PROJECT_KEY != '' }}
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.php.coverage.reportPaths=coverage.xml
            -Dsonar.qualitygate.wait=true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: junit.xml
          retention-days: 7
